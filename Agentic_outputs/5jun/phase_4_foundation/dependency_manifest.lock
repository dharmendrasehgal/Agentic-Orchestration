# ------------------------------------------------------------------------------
# [security-overrides]
# Versions pinned here override any transitive resolution due to active CVEs.
# All overrides must be accompanied by a CVE reference and a review ticket.
# ------------------------------------------------------------------------------
[security-overrides]

# CVE-2023-44487 (HTTP/2 Rapid Reset) — affects golang.org/x/net < 0.17.0
# Ticket: DCMS-SEC-001
golang.org/x/net@v0.26.0

# CVE-2024-24786 (protobuf infinite loop) — affects google.golang.org/protobuf < 1.33.0
# Ticket: DCMS-SEC-002
google.golang.org/protobuf@v1.34.2

# CVE-2023-48795 (Terrapin SSH) — affects golang.org/x/crypto < 0.17.0
# Ticket: DCMS-SEC-003
golang.org/x/crypto@v0.24.0

# CVE-2024-28180 (go-jose memory exhaustion) — affects gopkg.in/square/go-jose.v2 < 2.6.0
# Ticket: DCMS-SEC-004
# go-jose is a transitive dep of jwt/v5; resolved by upgrading jwt/v5 to v5.2.1+
github.com/golang-jwt/jwt/v5@v5.2.1

# CVE-2024-29018 (Docker DNS rebinding via internal network) — affects docker < 26.0.2
# Ticket: DCMS-SEC-005
github.com/docker/docker@v26.1.4+incompatible

# CVE-2024-21626 (runc container escape) — affects runc < 1.1.12
# Ticket: DCMS-SEC-006
# Mitigated by base image; agents must run on hosts with runc >= 1.1.12.
# No Go module pin; enforce via host OS patch policy.

# CVE-2024-3094 (xz/liblzma backdoor) — affects xz-utils 5.6.0, 5.6.1
# Ticket: DCMS-SEC-007
# Not a Go module; enforced in Dockerfile base image selection.
# All Dockerfiles must use debian:bookworm-slim >= 20240401 or alpine >= 3.19.1.

# GHSA-2c7c-3mj9-8ppk (axios SSRF) — affects axios < 1.7.2 (frontend)
# Ticket: DCMS-SEC-008
# axios@1.7.2    (already pinned in [frontend])
