      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-dcms_dev}
      POSTGRES_USER: ${POSTGRES_USER:-dcms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_dev_only}
      POSTGRES_SSL_MODE: ${POSTGRES_SSL_MODE:-disable}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      PROMETHEUS_URL: ${PROMETHEUS_URL:-http://prometheus:9090}
      ALERT_CHANNEL: ${ALERT_CHANNEL:-dcms.alerts}
      CONTAINER_CPU_ALERT_THRESHOLD: ${CONTAINER_CPU_ALERT_THRESHOLD:-80}
