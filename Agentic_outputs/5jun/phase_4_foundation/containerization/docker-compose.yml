      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-dcms_dev}
      POSTGRES_USER: ${POSTGRES_USER:-dcms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_dev_only}
      POSTGRES_SSL_MODE: ${POSTGRES_SSL_MODE:-disable}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REGISTRY_CREDENTIALS_ENCRYPTION_KEY: ${REGISTRY_CREDENTIALS_ENCRYPTION_KEY:-dev-encryption-key-32-chars-minimum}
      TRIVY_CACHE_DIR: /tmp/trivy-cache
      SCAN_RESULT_TTL: ${SCAN_RESULT_TTL:-300}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
      OTEL_SERVICE_NAME: image-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dcms-backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M    # Trivy scans are memory-intensive

  # ---------------------------------------------------------------------------
  # DCMS Go Service: network-service (port 8084)
  # ---------------------------------------------------------------------------
  network-service:
    build:
      context: ./services/network-service
      dockerfile: ../../containerization/Dockerfile.services
      args:
