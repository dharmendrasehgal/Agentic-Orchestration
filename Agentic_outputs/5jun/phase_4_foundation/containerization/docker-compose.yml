        GO_VERSION: "1.22"
        PORT: "8085"
        VERSION: dev
        COMMIT: local
    image: ${IMAGE_PREFIX:-dcms}/volume-service:${IMAGE_TAG:-dev}
    restart: unless-stopped
    environment:
      SERVICE_NAME: volume-service
      PORT: "8085"
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-dcms_dev}
      POSTGRES_USER: ${POSTGRES_USER:-dcms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_dev_only}
      POSTGRES_SSL_MODE: ${POSTGRES_SSL_MODE:-disable}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      DOCKER_HOST: ${DOCKER_HOST:-unix:///var/run/docker.sock}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
      OTEL_SERVICE_NAME: volume-service
    volumes:
