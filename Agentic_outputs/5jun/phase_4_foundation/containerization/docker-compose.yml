      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-dcms_dev}
      POSTGRES_USER: ${POSTGRES_USER:-dcms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_dev_only}
      POSTGRES_SSL_MODE: ${POSTGRES_SSL_MODE:-disable}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      ALERT_CHANNEL: ${ALERT_CHANNEL:-dcms.alerts}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-dcms-noreply@localhost}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_TLS: ${SMTP_TLS:-false}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      NOTIFICATION_DEDUP_TTL: ${NOTIFICATION_DEDUP_TTL:-5m}
      NOTIFICATION_RETRY_MAX: ${NOTIFICATION_RETRY_MAX:-5}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
      OTEL_SERVICE_NAME: notification-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - dcms-backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8088/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M

  # ---------------------------------------------------------------------------
  # DCMS Go Service: agent (gRPC port 9090)
  # Runs on the same host as the Docker daemon it manages.
  # In dev, this runs alongside the compose stack and manages local Docker.
  # ---------------------------------------------------------------------------
  agent:
    build:
      context: ./services/agent
      dockerfile: ../../containerization/Dockerfile.services
      args:
        SERVICE_NAME: agent
        GO_VERSION: "1.22"
        PORT: "9090"
        VERSION: dev
        COMMIT: local
    image: ${IMAGE_PREFIX:-dcms}/agent:${IMAGE_TAG:-dev}
    restart: unless-stopped
    environment:
      SERVICE_NAME: agent
      AGENT_GRPC_PORT: ${AGENT_GRPC_PORT:-9090}
      AGENT_TLS_CERT_PATH: ${AGENT_TLS_CERT_PATH:-/certs/agent.crt}
      AGENT_TLS_KEY_PATH: ${AGENT_TLS_KEY_PATH:-/certs/agent.key}
      DCMS_CA_CERT_PATH: ${DCMS_CA_CERT_PATH:-/certs/ca.crt}
      DOCKER_HOST: unix:///var/run/docker.sock
      CLUSTER_SERVICE_URL: ${CLUSTER_SERVICE_URL:-http://cluster-service:8089}
      LOG_SERVICE_URL: ${LOG_SERVICE_URL:-http://log-service:8087}
      AGENT_HEARTBEAT_INTERVAL: ${AGENT_HEARTBEAT_INTERVAL:-30s}
      AGENT_LOG_BUFFER_HOURS: ${AGENT_LOG_BUFFER_HOURS:-1}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./certs:/certs:ro
    depends_on:
      cluster-service:
        condition: service_healthy
      log-service:
        condition: service_healthy
    networks:
      - dcms-backend
    healthcheck:
      # Agent exposes gRPC health check; for compose we use the HTTP sidecar port.
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M

  # ---------------------------------------------------------------------------
  # Frontend: React SPA served by Nginx (dev uses Vite dev server via override)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_VERSION: "20"
        VERSION: dev
    image: ${IMAGE_PREFIX:-dcms}/frontend:${IMAGE_TAG:-dev}
    restart: unless-stopped
    environment:
      NGINX_PORT: "80"
      API_GATEWAY_URL: http://kong:8000
      # Injected at build time via Vite env substitution:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
      VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-/events}
    ports:
      - "3000:80"
    depends_on:
      kong:
        condition: service_healthy
    networks:
      - dcms-frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 64M

  # ---------------------------------------------------------------------------
  # Observability: Prometheus
  # Profile: observe (not started by default — use --profile observe)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
      - "--log.level=${LOG_LEVEL:-info}"
    volumes:
      - prometheus-data:/prometheus
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/rules:/etc/prometheus/rules:ro
      - ./config/prometheus/targets:/etc/prometheus/targets:ro
    ports:
      - "9090:9090"
    networks:
      - dcms-backend
      - dcms-frontend
    profiles:
      - observe
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Observability: Grafana
  # Profile: observe
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: "3000"
      GF_INSTALL_PLUGINS: ""
      GF_LOG_LEVEL: ${LOG_LEVEL:-info}
      # Datasource provisioning via config file
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"    # 3001 on host to avoid conflict with frontend on 3000
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - dcms-backend
      - dcms-frontend
    profiles:
      - observe
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M

  # ---------------------------------------------------------------------------
  # Observability: Loki (log aggregation backend)
  # Profile: observe
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.1.0
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - loki-data:/loki
      - ./config/loki/loki.yml:/etc/loki/loki.yml:ro
    ports:
      - "3100:3100"
    networks:
      - dcms-backend
    profiles:
      - observe
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M

  # ---------------------------------------------------------------------------
  # Observability: Jaeger (distributed tracing — all-in-one dev image)
  # Profile: observe
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.58.0
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - jaeger-data:/badger
    ports:
      - "16686:16686"    # Jaeger UI
      - "4317:4317"      # OTLP gRPC receiver
      - "4318:4318"      # OTLP HTTP receiver
      - "14268:14268"    # Jaeger thrift HTTP (legacy)
    networks:
      - dcms-backend
      - dcms-frontend
    profiles:
      - observe
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:14269/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M

  # ---------------------------------------------------------------------------
  # Dev SMTP: Mailhog (catches all outbound email in development)
  # ---------------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    environment:
      MH_STORAGE: memory
      MH_API_BIND_ADDR: 0.0.0.0:8025
      MH_UI_BIND_ADDR: 0.0.0.0:8025
      MH_SMTP_BIND_ADDR: 0.0.0.0:1025
    ports:
      - "8025:8025"    # Mailhog web UI
      - "1025:1025"    # SMTP (dev services send email here)
    networks:
      - dcms-backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025/api/v2/messages || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
