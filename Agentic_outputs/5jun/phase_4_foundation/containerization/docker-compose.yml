# =============================================================================
# DCMS Docker Compose — Development Environment
# Document: CICD-IMPL-DCMS-001 / Containerization
# Version:  1.0.0
# Date:     2026-06-06
#
# Usage:
#   cp environment_configs/dev.env .env
#   docker compose up
#   docker compose --profile observe up    # + Prometheus / Grafana / Loki / Jaeger
#   docker compose down --volumes          # full teardown including data volumes
#
# Profiles:
#   (default)  — all DCMS services + postgres + redis + kong + mailhog
#   observe    — + prometheus + grafana + loki + jaeger
#
# Port summary (host-mapped):
#   3000  — frontend (Nginx / Vite dev server)
#   8080  — Kong API gateway (HTTP)
#   8443  — Kong API gateway (HTTPS)
#   3001  — Grafana
#   9090  — Prometheus
#   16686 — Jaeger UI
#   8025  — Mailhog web UI
#   1025  — Mailhog SMTP
#   5432  — PostgreSQL (host access for psql / migrations)
#   6379  — Redis (host access for redis-cli)
# =============================================================================

version: "3.8"

# =============================================================================
# Named volumes — persisted across container restarts.
# Run `docker compose down --volumes` to wipe all data.
# =============================================================================
volumes:
  # Stateful service data
  postgres-data:
    driver: local
  redis-data:
    driver: local
  # Observability stack data
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local
  jaeger-data:
    driver: local
  # Kong declarative config (read-only bind in service definition)
  kong-config:
    driver: local

# =============================================================================
# Networks
# dcms-backend  — internal service mesh; NOT exposed to the host network
# dcms-frontend — web-facing tier: frontend, Kong, observability UIs
# =============================================================================
networks:
  dcms-backend:
    driver: bridge
    internal: true              # containers cannot reach the internet directly
    ipam:
      config:
        - subnet: 172.28.0.0/20

  dcms-frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/24

# =============================================================================
# Services
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # Infrastructure: PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16.3-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dcms_dev}
      POSTGRES_USER: ${POSTGRES_USER:-dcms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_dev_only}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
      # Enable connection logging for development debugging.
      POSTGRES_OPTIONS: "-c log_connections=on -c log_statement=all -c log_min_duration_statement=100"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Init scripts run once on first container creation (alphabetical order).
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    networks:
      - dcms-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dcms} -d ${POSTGRES_DB:-dcms_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Infrastructure: Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2.5-alpine
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:-}
        --appendonly yes
        --appendfsync everysec
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
        --save 60 10000
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    networks:
      - dcms-backend
    healthcheck:
      test: >
        ["CMD-SHELL",
         "redis-cli ${REDIS_PASSWORD:+-a $REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 384M

  # ---------------------------------------------------------------------------
  # Infrastructure: Kong API Gateway (DB-less, declarative config)
  # ---------------------------------------------------------------------------
  kong:
    image: kong:3.7.1-ubuntu
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      KONG_SSL_CERT: /etc/kong/ssl/server.crt
      KONG_SSL_CERT_KEY: /etc/kong/ssl/server.key
      KONG_PLUGINS: bundled
      KONG_LOG_LEVEL: ${LOG_LEVEL:-info}
      # Enable Prometheus metrics endpoint at :8001/metrics
      KONG_STATUS_LISTEN: "0.0.0.0:8100"
    volumes:
      # Declarative config file (DB-less mode): defines services, routes, plugins.
      - ./config/kong/kong.yml:/etc/kong/kong.yml:ro
      # Self-signed dev TLS cert (generated by mkcert or provided by dev setup).
      - ./config/kong/ssl:/etc/kong/ssl:ro
    ports:
      - "8080:8000"    # Kong HTTP proxy
      - "8443:8443"    # Kong HTTPS proxy
      - "8001:8001"    # Kong admin API (dev only — NOT exposed in production)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dcms-backend
      - dcms-frontend
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # DCMS Go Service: auth-service (port 8081)
  # ---------------------------------------------------------------------------
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: ../../containerization/Dockerfile.services
      args:
        SERVICE_NAME: auth-service
        GO_VERSION: "1.22"
        PORT: "8081"
        VERSION: dev
        COMMIT: local
    image: ${IMAGE_PREFIX:-dcms}/auth-service:${IMAGE_TAG:-dev}
    restart: unless-stopped
    environment:
      SERVICE_NAME: auth-service
      PORT: "8081"
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-dcms_dev}
      POSTGRES_USER: ${POSTGRES_USER:-dcms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_dev_only}
      POSTGRES_SSL_MODE: ${POSTGRES_SSL_MODE:-disable}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_AUTH_DB:-0}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRY: ${JWT_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      OIDC_PROVIDER_URL: ${OIDC_PROVIDER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      MFA_ISSUER: ${MFA_ISSUER:-DCMS-Dev}
      ACCOUNT_LOCKOUT_ATTEMPTS: ${ACCOUNT_LOCKOUT_ATTEMPTS:-5}
      ACCOUNT_LOCKOUT_WINDOW: ${ACCOUNT_LOCKOUT_WINDOW:-10m}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
      OTEL_SERVICE_NAME: auth-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dcms-backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M

  # ---------------------------------------------------------------------------
  # DCMS Go Service: container-service (port 8082)
  # ---------------------------------------------------------------------------
  container-service:
    build:
      context: ./services/container-service
      dockerfile: ../../containerization/Dockerfile.services
      args:
        SERVICE_NAME: container-service
        GO_VERSION: "1.22"
        PORT: "8082"
        VERSION: dev
        COMMIT: local
    image: ${IMAGE_PREFIX:-dcms}/container-service:${IMAGE_TAG:-dev}
    restart: unless-stopped
    environment:
      SERVICE_NAME: container-service
      PORT: "8082"
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-dcms_dev}
      POSTGRES_USER: ${POSTGRES_USER:-dcms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_dev_only}
      POSTGRES_SSL_MODE: ${POSTGRES_SSL_MODE:-disable}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CLUSTER_SERVICE_URL: ${CLUSTER_SERVICE_URL:-http://cluster-service:8089}
      IMAGE_SERVICE_URL: ${IMAGE_SERVICE_URL:-http://image-service:8083}
      AGENT_GRPC_PORT: ${AGENT_GRPC_PORT:-9090}
      AGENT_TLS_CERT_PATH: ${AGENT_TLS_CERT_PATH:-/certs/agent.crt}
      AGENT_TLS_KEY_PATH: ${AGENT_TLS_KEY_PATH:-/certs/agent.key}
      DCMS_CA_CERT_PATH: ${DCMS_CA_CERT_PATH:-/certs/ca.crt}
      CONTAINER_EVENT_CHANNEL: ${CONTAINER_EVENT_CHANNEL:-dcms.container.events}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
      OTEL_SERVICE_NAME: container-service
    volumes:
      - ./certs:/certs:ro    # dev TLS certs for agent gRPC mTLS
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      cluster-service:
        condition: service_healthy
    networks:
      - dcms-backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
