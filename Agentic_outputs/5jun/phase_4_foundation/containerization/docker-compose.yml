    image: ${IMAGE_PREFIX:-dcms}/log-service:${IMAGE_TAG:-dev}
    restart: unless-stopped
    environment:
      SERVICE_NAME: log-service
      PORT: "8087"
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      LOKI_URL: ${LOKI_URL:-http://loki:3100}
      LOG_BATCH_SIZE: ${LOG_BATCH_SIZE:-1000}
      LOG_BATCH_INTERVAL: ${LOG_BATCH_INTERVAL:-1s}
      LOG_LOCAL_BUFFER_HOURS: ${LOG_LOCAL_BUFFER_HOURS:-1}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
