name: Software Factory Gate

on:
  pull_request:
    branches:
      - main
      - develop
      - 'release/**'
  push:
    branches:
      - main

# Cancel in-progress runs on the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Gate 1: Canonical Lockfile ────────────────────────────────────────────
  check_lock:
    name: Enforce Canonical Lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install depman CLI
        run: |
          cd updated-agents/tools/dependency-manager
          npm ci
          npm link

      - name: Check lockfile against canonical
        env:
          DEPMAN_LOCK: package-lock.json
          DEPMAN_CANONICAL_LOCK: ./canonical-lock.json
        run: depman check-lock
        # Continues so gate_status can report the failure with context
        continue-on-error: true

  # ── Gate 2: Per-Track Dry-Run Sandbox ────────────────────────────────────
  sandbox:
    name: Dry-Run Sandbox (${{ matrix.track }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        track: [backend, frontend, db, integration]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install from canonical lockfile
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "No package-lock.json found; skipping install."
          fi

      - name: Install depman CLI
        run: |
          cd updated-agents/tools/dependency-manager
          npm ci
          npm link

      - name: Run dry-run sandbox (${{ matrix.track }} track)
        env:
          DEPMAN_LOCK: package-lock.json
          DEPMAN_TRACK: ${{ matrix.track }}
        run: depman dry-run --track ${{ matrix.track }}
        continue-on-error: true

      - name: Upload sandbox report (${{ matrix.track }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-report-${{ matrix.track }}
          path: sandbox_report_${{ matrix.track }}.json
          if-no-files-found: warn

  # ── Gate 3: Aggregate Status ─────────────────────────────────────────────
  gate_status:
    name: Software Factory Gate Status
    runs-on: ubuntu-latest
    needs: [check_lock, sandbox]
    if: always()
    steps:
      - name: Evaluate gate results
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Software Factory Gate Results"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  check_lock:        ${{ needs.check_lock.result }}"
          echo "  sandbox (matrix):  ${{ needs.sandbox.result }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          FAILED=0

          if [[ "${{ needs.check_lock.result }}" == "failure" ]]; then
            echo "FAIL: Canonical lockfile check failed."
            echo "  → Assign to dependency_manager_agent for review."
            FAILED=1
          fi

          if [[ "${{ needs.sandbox.result }}" == "failure" ]]; then
            echo "FAIL: One or more sandbox tracks failed."
            echo "  → Review sandbox-report-{track} artifacts."
            echo "  → Assign failing track to the responsible developer."
            FAILED=1
          fi

          if [[ $FAILED -eq 1 ]]; then
            echo ""
            echo "GATE BLOCKED: Resolve all failures before requesting Tech Lead review."
            exit 1
          fi

          echo "GATE PASSED: All dependency and sandbox checks successful."
          echo "  → PR is ready for Tech Lead review (dual_gate_control_loops.md)."
